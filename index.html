<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downloads</title>

<style>
body{
  background:#f8fafc;
  font-family:'Segoe UI', sans-serif;
  margin:0;
  padding:40px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h2{
  margin:20px 0 10px;
  color:#0f172a;
}

.button-container{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:20px;
}

.glow-btn{
  width:100px;
  height:80px;
  border:none;
  border-radius:15px;
  background:#e2e8f0;
  color:#2563eb;
  font-size:14px;
  cursor:pointer;
  transition:0.25s;
}

.glow-btn:hover{
  background:#2563eb;
  color:white;
  transform:translateY(-3px);
}

#toast{
  position:fixed;
  bottom:25px;
  right:25px;
  background:#0ea5e9;
  color:white;
  padding:12px 18px;
  border-radius:10px;
  display:none;
}
</style>

</head>

<body>

<!-- 📦 ZIP FILES -->

<h2>📦 Practical Files</h2>
<div class="button-container">

<button class="glow-btn" data-file="prac-1abc.qgz.zip">P1</button> <button class="glow-btn" data-file="prac-1d.qgz.zip">P1D</button> <button class="glow-btn" data-file="prac3-a.qgz.zip">P3</button> <button class="glow-btn" data-file="prac5.qgz.zip">P5</button> <button class="glow-btn" data-file="prac-7.qgz.zip">P7</button> <button class="glow-btn" data-file="prac-7b.qgz.zip">P7B</button>

</div>

<!-- 📊 CSV -->

<h2>📊 CSV</h2>
<div class="button-container">
<button class="glow-btn" data-file="Sales.csv">CSV</button>
</div>

<!-- 📄 PDF -->

<h2>📄 PDF</h2>
<div class="button-container">
<button class="glow-btn" data-file="BIDoc.pdf">PDF</button>
</div>

<!-- 📝 DOC -->

<h2>📝 Word File</h2>
<div class="button-container">
<button class="glow-btn" data-file="PRACTICAL_NO_03.docx">DOC</button>
</div>

<div id="toast">Downloading...</div>

<script>

const buttons = document.querySelectorAll(".glow-btn");
const toast = document.getElementById("toast");

buttons.forEach(button => {

  button.addEventListener("click", () => {

    const file = button.dataset.file;

    const link = document.createElement("a");
    link.href = file;
    link.download = file;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    showToast("Downloading ⬇");

  });

});

function showToast(message){
  toast.innerText = message;
  toast.style.display = "block";

  setTimeout(()=>{
    toast.style.display = "none";
  },1500);
}

</script>

</body>
</html>
