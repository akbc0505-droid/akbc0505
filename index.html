<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practical Helper</title>

<style>
body{
  background:#f8fafc;
  font-family:'Segoe UI', sans-serif;
  margin:0;
  padding:40px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h2{
  margin:20px 0 10px;
  color:#0f172a;
}

.button-container{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:20px;
}

.glow-btn{
  width:90px;
  height:80px;
  border:none;
  border-radius:15px;
  background:#e2e8f0;
  color:#2563eb;
  font-size:14px;
  cursor:pointer;
  transition:0.25s;
}

.glow-btn:hover{
  background:#2563eb;
  color:white;
  transform:translateY(-3px);
}

#toast{
  position:fixed;
  bottom:25px;
  right:25px;
  background:#0ea5e9;
  color:white;
  padding:12px 18px;
  border-radius:10px;
  display:none;
}
</style>

</head>

<body>

<!-- 💻 CODE FILES -->

<h2>💻 Code Practicals</h2>
<div class="button-container">

<button class="glow-btn" data-type="copy" data-file="PY3.txt">P3</button> <button class="glow-btn" data-type="copy" data-file="py4.txt">P4</button> <button class="glow-btn" data-type="copy" data-file="py5.txt">P5</button> <button class="glow-btn" data-type="copy" data-file="py6.txt">P6</button> <button class="glow-btn" data-type="copy" data-file="py7.txt">P7 Code</button> <button class="glow-btn" data-type="copy" data-file="Py8a.py">P8A</button>

</div>

<!-- 📊 CSV FILE -->

<h2>📊 CSV Data</h2>
<div class="button-container">

<button class="glow-btn" data-type="download" data-file="Sales.csv">P7 CSV</button>

</div>

<!-- 📄 PDF FILE -->

<h2>📄 PDF</h2>
<div class="button-container">

<button class="glow-btn" data-type="download" data-file="BIDoc.pdf">PDF</button>

</div>

<!-- 📝 WORD FILE -->

<h2>📝 Word File</h2>
<div class="button-container">

<button class="glow-btn" data-type="download" data-file="PRACTICAL NO 03.docx">DOC</button>

</div>

<div id="toast">Done</div>

<script>

const buttons = document.querySelectorAll(".glow-btn");
const toast = document.getElementById("toast");

buttons.forEach(button => {

  button.addEventListener("click", async () => {

    const file = button.dataset.file;
    const type = button.dataset.type;

    try{

      if(type === "copy"){

        const response = await fetch(file);

        if(!response.ok){
          throw new Error("File not found");
        }

        const text = await response.text();
        await navigator.clipboard.writeText(text);

        showToast("Copied 👍");

      }

      if(type === "download"){

        const link = document.createElement("a");
        link.href = file;
        link.download = file;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        showToast("Downloading ⬇");

      }

    }catch(error){
      console.error(error);
      showToast("Error ❌");
    }

  });

});

function showToast(message){
  toast.innerText = message;
  toast.style.display = "block";

  setTimeout(()=>{
    toast.style.display = "none";
  },1500);
}

</script>

</body>
</html>
